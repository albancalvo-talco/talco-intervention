<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0e0e0e">
<title>TALCO — Agent Vocal</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#E8A900;--gold-dim:#9e7200;
  --bg:#0e0e0e;--s1:#181818;--s2:#222;--s3:#2c2c2c;
  --b0:rgba(255,255,255,0.05);--b1:rgba(255,255,255,0.09);--b2:rgba(255,255,255,0.14);
  --text:#EEEAE4;--text2:#6a6860;
  --danger:#e05252;--success:#4ecb7a;--warn:#f5a623;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
.screen{display:none;flex-direction:column;height:100dvh;overflow:hidden;}
.screen.active{display:flex;}

/* ══ LOGIN ══ */
#screen-login{align-items:center;justify-content:center;padding:2rem 1.5rem;gap:0;position:relative;overflow:hidden;}
#screen-login::before{content:'';position:absolute;inset:0;background-image:radial-gradient(rgba(232,169,0,.09) 1px,transparent 1px);background-size:30px 30px;pointer-events:none;}
.login-logo-wrap{background:#fff;border-radius:12px;padding:12px 18px;margin-bottom:2rem;display:inline-block;box-shadow:0 0 0 1px rgba(232,169,0,.2),0 8px 40px rgba(0,0,0,.6);position:relative;z-index:1;}
.login-logo-wrap img{width:110px;display:block;}
.login-divider{width:36px;height:3px;background:var(--gold);border-radius:2px;margin:0 auto 1.8rem;position:relative;z-index:1;}
.login-title{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,8vw,2.6rem);font-weight:800;text-align:center;line-height:1.1;margin-bottom:.4rem;letter-spacing:-.02em;position:relative;z-index:1;}
.login-title span{color:var(--gold);}
.login-sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:2.6rem;position:relative;z-index:1;}
.btn-google{display:flex;align-items:center;gap:12px;background:var(--s2);border:1px solid var(--b2);color:var(--text);padding:15px 28px;border-radius:100px;font-family:'Syne',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;width:100%;max-width:300px;justify-content:center;position:relative;z-index:1;}
.btn-google:active{transform:scale(.97);border-color:var(--gold);}
.btn-google svg{width:20px;height:20px;flex-shrink:0;}
.login-note{margin-top:1.2rem;font-size:11px;color:var(--text2);text-align:center;position:relative;z-index:1;}

/* ══ HEADER ══ */
.header{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1rem;background:var(--s1);border-bottom:1px solid var(--b0);position:relative;flex-shrink:0;}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.55;}
.header-logo-wrap{background:#fff;border-radius:6px;padding:4px 7px;}
.header-logo-wrap img{width:58px;display:block;}
.header-right{display:flex;align-items:center;gap:10px;}
.header-user{display:flex;align-items:center;gap:7px;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--gold);color:#111;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.btn-new-session{
  font-family:'DM Mono',monospace;font-size:9px;color:var(--text2);
  background:var(--s2);border:1px solid var(--b1);border-radius:6px;
  padding:4px 8px;cursor:pointer;letter-spacing:.06em;
  transition:all .2s;
}
.btn-new-session:active{border-color:var(--gold);color:var(--gold);}

/* ══ CORPS PRINCIPAL ══ */
.chat-body{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;position:relative;}

/* ── HISTORIQUE CONVERSATION ── */
.conv-history{
  flex:1;overflow-y:auto;
  padding:12px;
  padding-right:100px;
  display:flex;flex-direction:column;gap:8px;
  min-height:0;
}
.conv-history::-webkit-scrollbar{width:3px;}
.conv-history::-webkit-scrollbar-track{background:transparent;}
.conv-history::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px;}

/* Bulles */
.bubble{
  max-width:82%;padding:10px 14px;
  border-radius:16px;font-size:14px;line-height:1.55;
  animation:bubble-in .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes bubble-in{from{opacity:0;transform:scale(.9) translateY(6px);}to{opacity:1;transform:scale(1) translateY(0);}}

.bubble.agent{
  align-self:flex-start;
  background:var(--s2);border:1px solid var(--b1);
  border-bottom-left-radius:4px;
  color:var(--text);
}
.bubble.agent .bubble-label{
  font-family:'DM Mono',monospace;font-size:9px;
  color:var(--gold);letter-spacing:.1em;margin-bottom:4px;
  text-transform:uppercase;
}
.bubble.user{
  align-self:flex-end;
  background:rgba(232,169,0,.12);
  border:1px solid rgba(232,169,0,.2);
  border-bottom-right-radius:4px;
  color:var(--text);
}
.bubble.user .bubble-label{
  font-family:'DM Mono',monospace;font-size:9px;
  color:var(--text2);letter-spacing:.1em;margin-bottom:4px;
  text-align:right;text-transform:uppercase;
}

/* Bulle typing */
.bubble.typing{
  align-self:flex-start;
  background:var(--s2);border:1px solid var(--b1);
  padding:12px 16px;
}
.typing-dots{display:flex;gap:4px;align-items:center;}
.typing-dots span{
  width:6px;height:6px;border-radius:50%;
  background:var(--text2);
  animation:typing-dot 1.2s ease-in-out infinite;
}
.typing-dots span:nth-child(2){animation-delay:.2s;}
.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes typing-dot{0%,60%,100%{transform:scale(.8);opacity:.4;}30%{transform:scale(1.2);opacity:1;}}

/* Récap champs — colonne verticale droite */
.fields-recap{
  position:absolute;
  right:0;top:0;bottom:0;
  width:90px;
  padding:10px 8px;
  background:var(--s1);
  border-left:1px solid var(--b0);
  overflow-y:auto;
  display:flex;flex-direction:column;gap:5px;
  scrollbar-width:none;
  z-index:5;
}
.fields-recap::-webkit-scrollbar{display:none;}
.field-chip{
  display:flex;align-items:center;gap:5px;
  background:var(--s2);border:1px solid var(--b1);
  border-radius:7px;padding:5px 7px;
  font-family:'DM Mono',monospace;font-size:8px;
  width:100%;
}
.field-chip.done{border-color:rgba(78,203,122,.3);background:rgba(78,203,122,.06);}
.field-chip.done .fc-dot{background:var(--success);}
.field-chip .fc-dot{width:5px;height:5px;border-radius:50%;background:var(--b2);flex-shrink:0;}
.field-chip .fc-label{color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.field-chip.done .fc-label{color:var(--success);}

/* ══ ZONE MICRO — bottom sheet orbe ══ */
.mic-zone{
  flex-shrink:0;
  background:var(--bg);
  border-top:1px solid rgba(232,169,0,.12);
  border-radius:22px 22px 0 0;
  padding:16px 16px 28px;
  padding-right:100px;
  display:flex;flex-direction:column;align-items:center;gap:0;
}

/* Orbe */
.orb-wrap{position:relative;width:120px;height:120px;margin-bottom:12px;flex-shrink:0;}
.orb-layer{position:absolute;inset:0;border-radius:50%;}
.orb-bg{
  background:conic-gradient(from 0deg,rgba(232,169,0,.75),rgba(180,60,80,.55),rgba(90,60,180,.65),rgba(60,120,180,.5),rgba(232,169,0,.75));
  filter:blur(14px);animation:spin-slow 5s linear infinite;
}
.orb-mid{
  inset:9px;
  background:radial-gradient(circle at 40% 35%,rgba(232,169,0,.92),rgba(160,50,80,.7) 45%,rgba(70,50,170,.55) 75%);
  filter:blur(6px);animation:pulse-mid 2.2s ease-in-out infinite alternate;
}
.orb-core{inset:22px;background:radial-gradient(circle at 42% 38%,rgba(255,222,100,.98),rgba(232,169,0,.85) 45%,rgba(140,40,70,.6) 85%);filter:blur(3px);}
.orb-shine{inset:0;background:radial-gradient(circle at 28% 22%,rgba(255,255,255,.16),transparent 55%);}
@keyframes spin-slow{0%{transform:rotate(0);}100%{transform:rotate(360deg);}}
@keyframes pulse-mid{0%{transform:scale(.92);filter:blur(6px);}100%{transform:scale(1.08);filter:blur(10px);}}

.orb-bg.idle{animation-duration:7s;filter:blur(14px) saturate(.5);}
.orb-bg.listening{animation-duration:1.3s;}
.orb-bg.speaking{animation-duration:2.5s;}
.orb-bg.processing{animation-duration:4s;filter:blur(14px) hue-rotate(30deg);}

/* Waveform */
.orb-wave{display:flex;align-items:center;justify-content:center;gap:3px;height:24px;width:160px;margin-bottom:10px;}
.wbar{width:3px;border-radius:2px;background:rgba(232,169,0,.4);animation:wavebar 1.3s ease-in-out infinite;min-height:2px;}
.wbar:nth-child(1){height:4px;animation-delay:0s;}.wbar:nth-child(2){height:10px;animation-delay:.07s;}
.wbar:nth-child(3){height:7px;animation-delay:.14s;}.wbar:nth-child(4){height:18px;animation-delay:.09s;}
.wbar:nth-child(5){height:12px;animation-delay:.18s;}.wbar:nth-child(6){height:22px;animation-delay:.04s;}
.wbar:nth-child(7){height:16px;animation-delay:.13s;}.wbar:nth-child(8){height:9px;animation-delay:.22s;}
.wbar:nth-child(9){height:20px;animation-delay:.08s;}.wbar:nth-child(10){height:14px;animation-delay:.17s;}
.wbar:nth-child(11){height:6px;animation-delay:.03s;}.wbar:nth-child(12){height:18px;animation-delay:.11s;}
@keyframes wavebar{0%,100%{transform:scaleY(.25);opacity:.3;}50%{transform:scaleY(1);opacity:1;}}
.orb-wave.idle .wbar{animation-duration:4s;opacity:.12;}
.orb-wave.listening .wbar{animation-duration:.6s;}
.orb-wave.speaking .wbar{animation-duration:1s;}
.orb-wave.processing .wbar{animation-duration:2s;opacity:.3;}

/* Status label */
.orb-status{
  font-family:'DM Mono',monospace;font-size:9px;
  color:var(--text2);letter-spacing:.12em;text-transform:uppercase;
  margin-bottom:14px;min-height:14px;text-align:center;
}
.orb-status.listening{color:var(--danger);}
.orb-status.speaking{color:var(--gold);}
.orb-status.processing{color:var(--warn);}

/* Bouton micro principal */
.btn-mic-main{
  width:68px;height:68px;border-radius:50%;
  background:var(--gold);color:#111;
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
  box-shadow:0 0 0 8px rgba(232,169,0,.1);
}
.btn-mic-main svg{width:26px;height:26px;}
.btn-mic-main.listening{
  background:var(--danger);
  box-shadow:0 0 0 8px rgba(224,82,82,.12);
  animation:mic-ring 1.1s ease-out infinite;
}
.btn-mic-main:active{transform:scale(.94);}
@keyframes mic-ring{0%{box-shadow:0 0 0 0 rgba(224,82,82,.5);}70%{box-shadow:0 0 0 20px rgba(224,82,82,0);}100%{box-shadow:0 0 0 0 rgba(224,82,82,0);}}

/* TOAST */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--s3);border:1px solid var(--b2);border-radius:100px;padding:10px 20px;font-size:12px;color:var(--text);white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none;z-index:300;}
.toast.visible{opacity:1;}

/* LOADING overlay léger */
.sending-indicator{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:32px;height:32px;
  border:2px solid var(--b2);border-top-color:var(--gold);
  border-radius:50%;animation:spin .7s linear infinite;
  display:none;z-index:10;
}
.sending-indicator.visible{display:block;}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg);}}
</style>
</head>

<script>
window.addEventListener('DOMContentLoaded',()=>{
  const src='data:image/jpeg;base64,'+LOGO_B64;
  document.querySelectorAll('#login-logo,#header-logo').forEach(i=>i.src=src);
  // Vérifier session sauvegardée
  const saved=loadUserSession();
  if(saved){
    state.user=saved;
    document.getElementById('user-name').textContent=saved.name.split(' ')[0];
    if(saved.picture){
      document.getElementById('user-avatar').innerHTML=`<img src="${saved.picture}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
    } else {
      document.getElementById('user-avatar').textContent=saved.initials;
    }
    startSession();
  }
});

const CONFIG={
  GOOGLE_CLIENT_ID:'303849110460-10rqg6oco2jseasj4ccsh1n0e4btulea.apps.googleusercontent.com',
  N8N_VOICE_URL:'/api/voice-chat',
  ALLOWED_DOMAIN:'talco-lr.com'
};

const FIELD_LABELS={
  nom_client:'Client',numero_affaire:'Affaire',
  date_debut:'Début',date_fin:'Fin',
  heure_debut:'H.début',heure_fin:'H.fin',
  redacteur:'Rédacteur',techniciens_presents:'Techniciens',
  clients_presents:'Clients site',type_intervention:'Type',
  designation_precise:'Description',raison_intervention:'Raison',
  chantier_termine:'Terminé',si_non_details:'Reste à faire',
  difficultes:'Difficultés',points_attention:'Points attention'
};

const FIELD_ORDER=Object.keys(FIELD_LABELS);

let state={
  user:null,
  session_id:null,
  history:[],
  responses:{},
  is_complete:false,
  isListening:false,
  isProcessing:false,
  mediaRecorder:null,
  audioChunks:[],
  currentAudio:null
};

// ══ AUTH — Session persistante 7 jours ══
const SESSION_KEY = 'talco_user_session';
const SESSION_TTL = 7 * 24 * 60 * 60 * 1000; // 7 jours en ms

function saveUserSession(user){
  const data = { user, expires: Date.now() + SESSION_TTL };
  localStorage.setItem(SESSION_KEY, JSON.stringify(data));
}

function loadUserSession(){
  try{
    const raw = localStorage.getItem(SESSION_KEY);
    if(!raw) return null;
    const data = JSON.parse(raw);
    if(Date.now() > data.expires){ localStorage.removeItem(SESSION_KEY); return null; }
    return data.user;
  }catch(e){ return null; }
}

function clearUserSession(){
  localStorage.removeItem(SESSION_KEY);
}

function handleGoogleCredential(r){
  try{
    const p=JSON.parse(atob(r.credential.split('.')[1]));
    const email=p.email||'',name=p.name||email.split('@')[0];
    if(!email.endsWith('@'+CONFIG.ALLOWED_DOMAIN)){document.getElementById('login-error').style.display='block';if(window.google)google.accounts.id.prompt();return;}
    document.getElementById('login-error').style.display='none';
    const initials=name.split(' ').map(s=>s[0]).join('').slice(0,2).toUpperCase();
    state.user={email,name,initials,picture:p.picture||null};
    saveUserSession(state.user);
    if(p.picture)document.getElementById('user-avatar').innerHTML=`<img src="${p.picture}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
    startSession();
  }catch(e){showToast('Erreur de connexion');}
}

function loginFallback(){
  const email=prompt('Email (hors-ligne):','prenom.nom@talco-lr.com');
  if(!email||!email.endsWith('@'+CONFIG.ALLOWED_DOMAIN)){document.getElementById('login-error').style.display='block';return;}
  document.getElementById('login-error').style.display='none';
  const name=email.split('@')[0].split('.').map(s=>s.charAt(0).toUpperCase()+s.slice(1)).join(' ');
  state.user={email,name,initials:name.split(' ').map(s=>s[0]).join('').slice(0,2).toUpperCase()};
  saveUserSession(state.user);
  startSession();
}

setTimeout(()=>{if(!window.google)document.getElementById('btn-fallback').style.display='flex';},4000);

function startSession(){
  document.getElementById('user-name').textContent=state.user.name.split(' ')[0];
  if(!state.user.picture)document.getElementById('user-avatar').textContent=state.user.initials;
  state.session_id=`session_${Date.now()}_${Math.random().toString(36).slice(2,8)}`;
  state.history=[];state.responses={};state.is_complete=false;
  document.getElementById('conv-history').innerHTML='';
  updateFieldsRecap();
  showScreen('chat');
  sendToAgent(null,'__init__');
}

function newSession(){
  state.session_id=`session_${Date.now()}_${Math.random().toString(36).slice(2,8)}`;
  state.history=[];state.responses={};state.is_complete=false;
  document.getElementById('conv-history').innerHTML='';
  updateFieldsRecap();
  sendToAgent(null,'__init__');
}

// ══ MICRO ══
async function toggleMic(){
  if(state.isProcessing)return;
  unlockAudio(); // Débloquer l'audio au premier clic utilisateur
  if(state.isListening){
    stopRecording();
  } else {
    await startRecording();
  }
}

async function startRecording(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    state.audioChunks=[];
    state.mediaRecorder=new MediaRecorder(stream,{mimeType:'audio/webm'});
    state.mediaRecorder.ondataavailable=(e)=>{if(e.data.size>0)state.audioChunks.push(e.data);};
    state.mediaRecorder.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop());
      const blob=new Blob(state.audioChunks,{type:'audio/webm'});
      const b64=await blobToBase64(blob);
      sendToAgent(b64,null);
    };
    state.mediaRecorder.start();
    state.isListening=true;
    setOrbState('listening');
    document.getElementById('btn-mic').classList.add('listening');
    document.getElementById('orb-status').textContent='Écoute en cours...';
    document.getElementById('orb-status').className='orb-status listening';
  }catch(e){
    showToast('Micro non disponible : '+e.message);
  }
}

function stopRecording(){
  if(state.mediaRecorder&&state.isListening){
    state.mediaRecorder.stop();
    state.isListening=false;
    document.getElementById('btn-mic').classList.remove('listening');
    setOrbState('processing');
    document.getElementById('orb-status').textContent='Traitement...';
    document.getElementById('orb-status').className='orb-status processing';
  }
}

function blobToBase64(blob){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=rej;
    r.readAsDataURL(blob);
  });
}

// ══ AGENT ══
async function sendToAgent(audioBase64, textInput){
  if(state.isProcessing)return;
  state.isProcessing=true;
  document.getElementById('sending-indicator').classList.add('visible');

  // Afficher bulle user si audio
  if(audioBase64){
    addBubble('user','🎤 Message vocal');
  }

  // Afficher typing
  const typingId='typing-'+Date.now();
  addTyping(typingId);

  try{
    const payload={
      session_id:   state.session_id,
      sender_email: state.user.email,
      sender_name:  state.user.name,
      history:      state.history,
      responses:    state.responses
    };
    if(audioBase64)   payload.audio_base64=audioBase64;
    if(textInput==='__init__') payload.text_input='__init__';

    const resp=await fetch(CONFIG.N8N_VOICE_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });

    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const data=await resp.json();

    // Retirer typing
    removeTyping(typingId);

    // Mettre à jour l'état
    state.history=data.history||state.history;
    state.responses={...state.responses,...(data.responses||{})};
    state.is_complete=data.is_complete||false;

    // Afficher bulle agent
    if(data.speech) addBubble('agent',data.speech);

    // Mettre à jour le recap champs
    updateFieldsRecap();

    // Jouer l'audio TTS
    if(data.audio_base64){
      await playAudio(data.audio_base64);
    }

    // Session terminée
    if(state.is_complete){
      setOrbState('idle');
      document.getElementById('orb-status').textContent='Rapport complet ✓';
      document.getElementById('orb-status').className='orb-status';
      document.getElementById('btn-mic').style.opacity='.4';
      document.getElementById('btn-mic').style.pointerEvents='none';
    }

  }catch(e){
    removeTyping(typingId);
    addBubble('agent','Désolé, une erreur s\'est produite. Réessaie.');
    showToast('Erreur : '+e.message);
  }finally{
    state.isProcessing=false;
    document.getElementById('sending-indicator').classList.remove('visible');
    if(!state.is_complete && !state.currentAudio){
      setOrbState('idle');
      document.getElementById('orb-status').textContent='Appuie pour parler';
      document.getElementById('orb-status').className='orb-status';
    }
  }
}

// ══ AUDIO TTS ══
// AudioContext débloqué au premier clic utilisateur
let audioCtx = null;

function unlockAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if(audioCtx.state === 'suspended') audioCtx.resume();
}

async function playAudio(base64){
  return new Promise(async (resolve)=>{
    if(!base64){resolve();return;}
    try{
      if(state.currentAudio){
        state.currentAudio.pause();
        state.currentAudio=null;
      }

      // Décoder le base64 en ArrayBuffer et jouer via AudioContext (contourne autoplay)
      const raw = base64.replace(/^data:audio\/[^;]+;base64,/,'');
      const binary = atob(raw);
      const bytes = new Uint8Array(binary.length);
      for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);

      unlockAudio();
      const buffer = await audioCtx.decodeAudioData(bytes.buffer);
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      source.connect(audioCtx.destination);

      setOrbState('speaking');
      document.getElementById('orb-status').textContent='TALCO-IA parle...';
      document.getElementById('orb-status').className='orb-status speaking';

      source.onended = ()=>{ resolve(); };
      source.start(0);
      state.currentAudio = source;

    }catch(e){
      console.error('Audio error:', e);
      resolve();
    }
  });
}


// ══ UI ══
function addBubble(role,text){
  const hist=document.getElementById('conv-history');
  const div=document.createElement('div');
  div.className='bubble '+role;
  const label=role==='agent'?'TALCO-IA':state.user.name.split(' ')[0];
  div.innerHTML=`<div class="bubble-label">${label}</div>${escHtml(text)}`;
  hist.appendChild(div);
  hist.scrollTop=hist.scrollHeight;
}

function addTyping(id){
  const hist=document.getElementById('conv-history');
  const div=document.createElement('div');
  div.className='bubble typing';div.id=id;
  div.innerHTML='<div class="typing-dots"><span></span><span></span><span></span></div>';
  hist.appendChild(div);
  hist.scrollTop=hist.scrollHeight;
}

function removeTyping(id){
  document.getElementById(id)?.remove();
}

function updateFieldsRecap(){
  const recap=document.getElementById('fields-recap');
  recap.innerHTML='';
  FIELD_ORDER.forEach(key=>{
    const val=state.responses[key];
    const chip=document.createElement('div');
    chip.className='field-chip'+(val?' done':'');
    chip.innerHTML=`<div class="fc-dot"></div><span class="fc-label">${FIELD_LABELS[key]}</span>`;
    if(val) chip.title=val;
    recap.appendChild(chip);
  });
}

function setOrbState(s){
  document.getElementById('orb-bg').className='orb-layer orb-bg '+s;
  document.getElementById('orb-wave').className='orb-wave '+s;
}

function escHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showScreen(n){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+n).classList.add('active');}
function showToast(msg,d=3000){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('visible');setTimeout(()=>t.classList.remove('visible'),d);}
</script>
