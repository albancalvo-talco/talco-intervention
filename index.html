<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="TALCO">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>TALCO LR — Rapport d'Intervention</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#E8A900;--bg:#0a0a0a;--s1:#111;--s2:#181818;--s3:#222;--border:rgba(255,255,255,.08);--text:#f0ece4;--text2:#706e66;--text3:#4a4840;--danger:#e05252;--success:#4ecb7a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
.screen{display:none;flex-direction:column;height:100dvh;overflow:hidden;}
.screen.active{display:flex;}
#screen-login{align-items:center;justify-content:center;padding:2rem;gap:1.2rem;}
.login-title{font-family:Syne,sans-serif;font-size:2rem;font-weight:800;text-align:center;line-height:1.1;}
.login-title span{color:var(--gold);}
.login-sub{font-size:13px;color:var(--text2);text-align:center;}
.btn-google{display:flex;align-items:center;gap:12px;background:var(--s3);border:1px solid var(--border);color:var(--text);padding:14px 24px;border-radius:100px;font-size:14px;font-weight:600;cursor:pointer;width:100%;max-width:300px;justify-content:center;}
.btn-google svg{width:20px;height:20px;}
.login-note{font-size:11px;color:var(--text3);text-align:center;}
#login-error{display:none;padding:10px 16px;background:rgba(224,82,82,.1);border:1px solid var(--danger);border-radius:10px;font-size:12px;color:var(--danger);text-align:center;max-width:300px;}
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0;}
.header-user{display:flex;align-items:center;gap:8px;font-family:Syne,sans-serif;font-size:12px;font-weight:600;}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--gold);color:#111;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
.header-right{display:flex;align-items:center;gap:8px;}
.btn-new{font-family:'DM Mono',monospace;font-size:9px;color:var(--text2);background:transparent;border:1px solid var(--border);border-radius:100px;padding:5px 10px;cursor:pointer;}
.main-body{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.question-zone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;overflow:hidden;}
.progress-bar{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap;justify-content:center;max-width:100%;}
.progress-dot{width:8px;height:8px;border-radius:50%;background:var(--s3);transition:all .3s;cursor:pointer;}
.progress-dot.done{background:var(--success);}
.progress-dot.active{background:var(--gold);width:24px;border-radius:4px;box-shadow:0 0 12px rgba(232,169,0,.4);}
.progress-dot.pending{background:var(--s3);}
.current-question{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:24px 20px;max-width:340px;width:100%;animation:questionFadeIn .4s ease-out;}
@keyframes questionFadeIn{from{opacity:0;transform:translateY(20px) scale(.95);}to{opacity:1;transform:translateY(0) scale(1);}}
.q-category{font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:6px;}
.q-category::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--gold);}
.q-text{font-family:Syne,sans-serif;font-size:1.3rem;font-weight:700;line-height:1.3;color:var(--text);margin-bottom:8px;}
.q-hint{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);font-style:italic;}
.q-answer{margin-top:14px;padding:12px 16px;background:rgba(78,203,122,.08);border:1px solid rgba(78,203,122,.25);border-radius:12px;font-size:14px;color:var(--success);display:flex;align-items:center;gap:8px;}
.q-answer::before{content:'✓';font-weight:700;}
.q-answer.pending{background:rgba(232,169,0,.08);border-color:rgba(232,169,0,.25);color:var(--gold);}
.q-answer.pending::before{content:'⏳';}
.progress-counter{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);margin-top:16px;letter-spacing:.08em;}
.progress-counter span{color:var(--gold);font-weight:600;}
.mic-zone{background:var(--bg);border-top:1px solid var(--border);padding:20px 16px 24px;display:flex;flex-direction:column;align-items:center;gap:14px;flex-shrink:0;}
.mic-start-state{display:flex;flex-direction:column;align-items:center;gap:16px;width:100%;}
.mic-active-state{display:none;flex-direction:column;align-items:center;gap:14px;width:100%;}
.mic-zone.started .mic-start-state{display:none;}
.mic-zone.started .mic-active-state{display:flex;}
.voice-selector{position:relative;display:flex;align-items:center;}
.voice-btn{display:flex;align-items:center;gap:5px;background:var(--s2);border:2px solid var(--gold);border-radius:100px;padding:8px 12px;font-family:'Syne',sans-serif;font-size:10px;color:var(--gold);cursor:pointer;transition:all .2s;letter-spacing:.06em;font-weight:600;}
.voice-btn:active,.voice-btn.open{border-color:var(--gold);background:rgba(232,169,0,.15);color:var(--gold);}
.voice-btn svg{width:11px;height:11px;flex-shrink:0;}
.voice-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--s1);border:1px solid var(--border);border-radius:12px;overflow:hidden;z-index:300;min-width:210px;box-shadow:0 8px 32px rgba(0,0,0,.5);opacity:0;pointer-events:none;transform:translateY(-6px);transition:all .2s cubic-bezier(.4,0,.2,1);}
.voice-dropdown.open{opacity:1;pointer-events:all;transform:translateY(0);}
.voice-option{display:flex;flex-direction:column;gap:2px;padding:10px 14px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border);}
.voice-option:last-child{border-bottom:none;}
.voice-option:hover{background:var(--s2);}
.voice-option.active{background:rgba(232,169,0,.07);}
.vo-name{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px;}
.vo-name.active::after{content:'✓';color:var(--gold);font-size:10px;margin-left:auto;}
.vo-desc{font-family:'DM Mono',monospace;font-size:9px;color:var(--text2);}
.buttons-wrapper{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;width:100%;max-width:340px;}
.btn-start{width:100%;padding:18px 24px;border-radius:16px;border:none;background:var(--gold);color:#111;font-family:Syne,sans-serif;font-size:16px;font-weight:800;cursor:pointer;letter-spacing:-.01em;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 24px rgba(232,169,0,.25);transition:transform .15s,box-shadow .15s;}
.btn-start:active{transform:scale(.97);box-shadow:0 2px 12px rgba(232,169,0,.15);}
.btn-start svg{width:20px;height:20px;flex-shrink:0;}
.antenna-loading{position:absolute;top:0;left:50%;transform:translateX(-50%);width:80px;height:100px;pointer-events:none;z-index:10;}
.antenna-rod{position:absolute;width:3px;height:35px;background:var(--gold);left:50%;transform:translateX(-50%);bottom:0;border-radius:2px;}
.antenna-signal{position:absolute;width:40px;height:40px;left:50%;bottom:20px;transform:translateX(-50%);border:2px solid var(--gold);border-radius:50%;opacity:0;animation:antennaSignal 1.8s ease-out infinite;}
.antenna-signal:nth-child(2){animation-delay:.6s;width:55px;height:55px;}
.antenna-signal:nth-child(3){animation-delay:1.2s;width:70px;height:70px;}
@keyframes antennaSignal{0%{opacity:.8;transform:translateX(-50%) scale(.4);}100%{opacity:0;transform:translateX(-50%) scale(1);}}
.connection-state{display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;min-height:200px;position:relative;}
.connection-state.visible{display:flex;}
.connection-state.visible + .buttons-wrapper{display:none;}
.walkie-btn{width:130px;height:130px;border-radius:24px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .3s cubic-bezier(.34,1.56,.64,1);touch-action:none;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;}
.walkie-btn:active{transform:scale(.93);}
.walkie-btn svg{width:100px;height:100px;transition:filter .4s;filter:brightness(0) invert(.85);}
.walkie-btn.listening svg{filter:brightness(0) saturate(100%) invert(38%) sepia(82%) saturate(2000%) hue-rotate(338deg) brightness(95%) contrast(92%);}
.walkie-btn.listening{animation:walkiePulse 1.2s ease-in-out infinite;filter:drop-shadow(0 0 18px rgba(224,82,82,.55));}
.walkie-btn.speaking svg{filter:brightness(0) saturate(100%) invert(67%) sepia(67%) saturate(600%) hue-rotate(5deg) brightness(100%) contrast(95%);}
.walkie-btn.speaking{animation:walkiePulse 1.5s ease-in-out infinite;}
.walkie-btn.processing svg{filter:brightness(0) invert(.4);opacity:.6;}
@keyframes walkiePulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
.mic-status{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.08em;text-align:center;min-height:16px;}
.timeout-bar-wrap{width:100%;max-width:300px;height:2px;background:var(--s3);border-radius:2px;overflow:hidden;opacity:0;transition:opacity .3s;}
.timeout-bar-wrap.visible{opacity:1;}
.timeout-bar{height:100%;background:var(--gold);border-radius:2px;width:100%;transition:width linear;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--s3);border:1px solid var(--border);border-radius:100px;padding:10px 20px;font-size:12px;color:var(--text);opacity:0;transition:opacity .3s;pointer-events:none;z-index:600;white-space:nowrap;}
.toast.visible{opacity:1;}
</style>
</head>
<body>

<div id="screen-login" class="screen active">
  <h1 class="login-title">Rapport<br><span>vocal</span></h1>
  <p class="login-sub">Connexion avec votre compte Talco LR</p>
  <div id="g_id_onload" data-client_id="303849110460-10rqg6oco2jseasj4ccsh1n0e4btulea.apps.googleusercontent.com" data-callback="handleGoogleCredential" data-auto_prompt="false"></div>
  <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="filled_black" data-text="signin_with" data-size="large" data-locale="fr" data-width="280"></div>
  <button class="btn-google" id="btn-fallback" onclick="loginFallback()" style="display:none">
    <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Se connecter avec Google
  </button>
  <p class="login-note">Réservé aux comptes @talco-lr.com</p>
  <div id="login-error">Compte non autorisé</div>
</div>

<div id="screen-chat" class="screen">
  <div class="header">
    <span style="font-family:Syne,sans-serif;font-size:14px;font-weight:700;color:var(--gold);">TALCO</span>
    <div class="header-right">
      <div class="header-user">
        <div class="avatar" id="user-avatar">T</div>
        <span id="user-name">Tech</span>
      </div>
      <div class="voice-selector" id="voice-selector">
        <button class="voice-btn" id="voice-btn" onclick="toggleVoiceDropdown()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          <span id="voice-btn-label">VOIX</span>
        </button>
        <div class="voice-dropdown" id="voice-dropdown">
          <div class="voice-option" data-voice="onyx" onclick="selectVoice('onyx')"><div class="vo-name" id="vo-onyx">Onyx</div><div class="vo-desc">Grave · idéale terrain</div></div>
          <div class="voice-option" data-voice="nova" onclick="selectVoice('nova')"><div class="vo-name" id="vo-nova">Nova</div><div class="vo-desc">Féminine · ton énergique</div></div>
        </div>
      </div>
      <button class="btn-new" onclick="newSession()">NOUVEAU</button>
    </div>
  </div>
  
  <div class="main-body">
    <div class="question-zone" id="question-zone">      
      <div id="question-content" style="display:none;width:100%;max-width:360px;">
        <div class="progress-bar" id="progress-bar"></div>
        <div class="current-question" id="current-question">
          <div class="q-category" id="q-category">identification</div>
          <div class="q-text" id="q-text">Nom du client ?</div>
          <div class="q-hint" id="q-hint">ex : Mairie de Montpellier</div>
          <div class="q-answer" id="q-answer" style="display:none;"></div>
        </div>
        <div class="progress-counter" id="progress-counter">
          Question <span>1</span> / 16
        </div>
      </div>
    </div>
    
    <div class="mic-zone" id="mic-zone">
      <div class="mic-start-state">
        <div class="connection-state" id="connection-state">
          <div class="antenna-loading" id="antenna-loading">
            <div class="antenna-rod"></div>
            <div class="antenna-signal"></div>
            <div class="antenna-signal"></div>
            <div class="antenna-signal"></div>
          </div>
          <div style="text-align:center;margin-top:80px;">
            <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;">Connexion...</div>
          </div>
        </div>

        <div class="buttons-wrapper">
          <button class="btn-start" onclick="startReport()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
            </svg>
            Commencer le rapport
          </button>
        </div>
      </div>

      <div class="mic-active-state">
        <button class="walkie-btn" id="walkie-btn">
          <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="44" y="2" width="4" height="22" rx="2" fill="currentColor"/><circle cx="46" cy="4" r="3" fill="currentColor"/>
            <rect x="28" y="22" width="36" height="62" rx="6" fill="currentColor"/>
            <rect x="34" y="30" width="24" height="14" rx="3" fill="#0a0a0a" opacity=".6"/>
            <line x1="37" y1="35" x2="55" y2="35" stroke="#0a0a0a" stroke-width="1.5" opacity=".3"/>
            <line x1="37" y1="39" x2="50" y2="39" stroke="#0a0a0a" stroke-width="1.5" opacity=".3"/>
            <line x1="36" y1="52" x2="56" y2="52" stroke="#0a0a0a" stroke-width="1.2" opacity=".25"/>
            <line x1="36" y1="56" x2="56" y2="56" stroke="#0a0a0a" stroke-width="1.2" opacity=".25"/>
            <line x1="36" y1="60" x2="56" y2="60" stroke="#0a0a0a" stroke-width="1.2" opacity=".25"/>
            <line x1="36" y1="64" x2="56" y2="64" stroke="#0a0a0a" stroke-width="1.2" opacity=".25"/>
            <line x1="36" y1="68" x2="56" y2="68" stroke="#0a0a0a" stroke-width="1.2" opacity=".25"/>
            <rect x="22" y="36" width="6" height="14" rx="2" fill="currentColor" opacity=".7"/>
            <rect x="38" y="84" width="16" height="6" rx="2" fill="currentColor" opacity=".5"/>
          </svg>
        </button>
        <div class="mic-status" id="mic-status">Maintiens pour parler</div>
        <div class="timeout-bar-wrap" id="timeout-bar-wrap"><div class="timeout-bar" id="timeout-bar"></div></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CONFIG = {
  VOICE_URL: 'https://n8n.talco-lr.com/webhook/talco-voice-chat',
  ALLOWED_DOMAIN: 'talco-lr.com',
  TIMEOUT_MS: 60000
};

const QUESTIONS = [
  {key:'nom_client',         text:"Nom du client ?"},
  {key:'numero_affaire',     text:"Numéro d'affaire ?"},
  {key:'date_debut',         text:"Date de début ?"},
  {key:'date_fin',           text:"Date de fin ?"},
  {key:'heure_debut',        text:"Heure de début ?"},
  {key:'heure_fin',          text:"Heure de fin ?"},
  {key:'redacteur',          text:"Qui rédige ce rapport ?"},
  {key:'techniciens_presents',text:"Techniciens présents ?"},
  {key:'clients_presents',   text:"Clients présents sur site ?"},
  {key:'type_intervention',  text:"Type d'intervention ?"},
  {key:'designation_precise',text:"Décris ce qui a été fait."},
  {key:'raison_intervention',text:"Raison de l'intervention ?"},
  {key:'chantier_termine',   text:"Chantier terminé ?"},
  {key:'si_non_details',     text:"Qu'est-ce qu'il reste à faire ?"},
  {key:'difficultes',        text:"Difficultés rencontrées ?"},
  {key:'points_attention',   text:"Points d'attention pour le prochain ?"}
];

let state = {user:null, session_id:null, responses:{}, is_complete:false, isProcessing:false, isListening:false, mediaRecorder:null, audioChunks:[], currentAudio:null, currentQuestionIndex:0};
const SESSION_KEY = 'talco_user_session';
let _audioUnlocked = false;
let _selectedVoice = localStorage.getItem('talco_voice') || 'onyx';

async function unlockAudio() {
  if (_audioUnlocked) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') await ctx.resume();
    _audioUnlocked = true;
  } catch (e) { _audioUnlocked = true; }
}

function saveUserSession(u) {
  localStorage.setItem(SESSION_KEY, JSON.stringify({user: u, expires: Date.now() + 7*24*60*60*1000}));
}

function loadUserSession() {
  try {
    const d = JSON.parse(localStorage.getItem(SESSION_KEY));
    return d && Date.now() < d.expires ? d.user : null;
  } catch (e) { return null; }
}

function handleGoogleCredential(r) {
  try {
    const p = JSON.parse(atob(r.credential.split('.')[1]));
    const email = p.email || '';
    if (!email.endsWith('@' + CONFIG.ALLOWED_DOMAIN)) {
      document.getElementById('login-error').style.display = 'block';
      return;
    }
    document.getElementById('login-error').style.display = 'none';
    const name = p.name || email.split('@')[0];
    const user = {email, name, initials: name.split(' ').map(s => s[0]).join('').slice(0, 2).toUpperCase()};
    saveUserSession(user);
    onUserAuthenticated(user);
  } catch (e) { console.error('❌ Auth:', e); }
}

function loginFallback() {
  const email = prompt('Email:', 'prenom.nom@talco-lr.com');
  if (!email || !email.endsWith('@' + CONFIG.ALLOWED_DOMAIN)) {
    document.getElementById('login-error').style.display = 'block';
    return;
  }
  document.getElementById('login-error').style.display = 'none';
  const name = email.split('@')[0].split('.').map(s => s.charAt(0).toUpperCase() + s.slice(1)).join(' ');
  const user = {email, name, initials: name.split(' ').map(s => s[0]).join('').slice(0, 2).toUpperCase()};
  saveUserSession(user);
  onUserAuthenticated(user);
}

function onUserAuthenticated(user) {
  state.user = user;
  document.getElementById('user-avatar').textContent = user.initials;
  document.getElementById('user-name').textContent = user.name.split(' ')[0];
  startSession();
}

function startSession() {
  state.session_id = 's_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
  state.responses = {};
  state.is_complete = false;
  state.isProcessing = false;
  state.currentQuestionIndex = 0;
  if (state.currentAudio) { try { state.currentAudio.pause(); } catch (e) {} state.currentAudio = null; }
  document.getElementById('mic-zone').classList.remove('started');
  document.getElementById('question-content').style.display = 'none';
  document.getElementById('connection-state').classList.remove('visible');
  document.getElementById('walkie-btn').className = 'walkie-btn';
  document.getElementById('mic-status').textContent = 'Maintiens pour parler';
  showScreen('chat');
}

function newSession() { startSession(); }

function showScreen(n) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + n).classList.add('active');
}

function showToast(msg, d = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('visible');
  setTimeout(() => t.classList.remove('visible'), d);
}

function updateQuestionDisplay() {
  let currentIdx = QUESTIONS.findIndex(q => !state.responses[q.key]);
  if (currentIdx === -1) currentIdx = QUESTIONS.length - 1;
  state.currentQuestionIndex = currentIdx;
  
  const q = QUESTIONS[currentIdx];
  const filledCount = QUESTIONS.filter(q => state.responses[q.key]).length;
  
  const bar = document.getElementById('progress-bar');
  bar.innerHTML = '';
  QUESTIONS.forEach((qq, i) => {
    const dot = document.createElement('div');
    dot.className = 'progress-dot';
    if (state.responses[qq.key]) dot.classList.add('done');
    else if (i === currentIdx) dot.classList.add('active');
    else dot.classList.add('pending');
    bar.appendChild(dot);
  });
  
  document.getElementById('q-text').textContent = q.text;
  
  const answerEl = document.getElementById('q-answer');
  if (state.responses[q.key]) {
    answerEl.textContent = state.responses[q.key];
    answerEl.className = 'q-answer';
    answerEl.style.display = 'flex';
  } else {
    answerEl.style.display = 'none';
  }
  
  document.getElementById('progress-counter').innerHTML = `Question <span>${currentIdx + 1}</span> / ${QUESTIONS.length} · ${filledCount} rempli${filledCount > 1 ? 's' : ''}`;
  
  const card = document.getElementById('current-question');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'questionFadeIn .4s ease-out';
}

function showQuestionContent() {
  document.getElementById('question-content').style.display = 'block';
  updateQuestionDisplay();
}

function showTimeoutBar(ms) {
  const wrap = document.getElementById('timeout-bar-wrap');
  const bar = document.getElementById('timeout-bar');
  wrap.classList.add('visible');
  bar.style.width = '100%';
  bar.offsetWidth;
  bar.style.transition = `width ${ms}ms linear`;
  bar.style.width = '0%';
}

function hideTimeoutBar() {
  document.getElementById('timeout-bar-wrap').classList.remove('visible');
}

let _pttActive = false;

function setupPTT() {
  const btn = document.getElementById('walkie-btn');
  btn.addEventListener('pointerdown', handlePTTStart, {passive: false});
  btn.addEventListener('pointerup', handlePTTEnd, {passive: false});
  btn.addEventListener('pointercancel', handlePTTEnd, {passive: false});
}

async function handlePTTStart(e) {
  e.preventDefault();
  if (_pttActive || state.isProcessing) return;
  _pttActive = true;
  await startRecording();
}

async function handlePTTEnd(e) {
  if (!_pttActive) return;
  _pttActive = false;
  await unlockAudio();
  if (state.isListening) {
    state.mediaRecorder.stop();
    state.isListening = false;
    document.getElementById('walkie-btn').classList.remove('listening');
    document.getElementById('walkie-btn').classList.add('processing');
    document.getElementById('mic-status').textContent = 'Envoi...';
  }
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio: true});
    state.audioChunks = [];
    state.mediaRecorder = new MediaRecorder(stream);
    state.mediaRecorder.ondataavailable = e => {
      if (e.data.size > 0) state.audioChunks.push(e.data);
    };
    state.mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(state.audioChunks);
      if (blob.size < 1000) {
        document.getElementById('mic-status').textContent = 'Maintiens pour parler';
        return;
      }
      const b64 = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result.replace(/^data:audio\/[^;]+;base64,/, '').replace(/\s+/g, ''));
        r.onerror = rej;
        r.readAsDataURL(blob);
      });
      sendToAgent(b64);
    };
    state.mediaRecorder.start();
    state.isListening = true;
    document.getElementById('walkie-btn').classList.add('listening');
    document.getElementById('mic-status').textContent = '🔴 Parle maintenant...';
  } catch (e) {
    console.error('❌ Micro:', e);
    _pttActive = false;
  }
}

async function playAudio(fieldName) {
  const url = `/talco-intervention/audio/${_selectedVoice}/${fieldName}.mp3`;
  console.log('🎵 Jouer:', fieldName);
  return new Promise(resolve => {
    const audio = new Audio(url);
    if (state.currentAudio) { try { state.currentAudio.pause(); } catch (e) {} }
    state.currentAudio = audio;
    document.getElementById('walkie-btn').classList.add('speaking');
    document.getElementById('mic-status').textContent = 'TALCO-IA parle...';
    const cleanup = () => {
      state.currentAudio = null;
      document.getElementById('walkie-btn').classList.remove('speaking');
      document.getElementById('mic-status').textContent = 'Maintiens pour parler';
      resolve();
    };
    audio.onended = () => { console.log('✅ Audio:', fieldName); cleanup(); };
    audio.onerror = (err) => { console.error('❌ Audio ERREUR:', fieldName, url); cleanup(); };
    audio.play().catch(err => { console.error('❌ play():', err); cleanup(); });
  });
}

async function sendToAgent(audioBase64) {
  if (state.isProcessing) return;
  state.isProcessing = true;
  document.getElementById('walkie-btn').classList.add('processing');
  showTimeoutBar(CONFIG.TIMEOUT_MS);
  
  try {
    const payload = {
      session_id: state.session_id,
      sender_email: state.user?.email || '',
      sender_name: state.user?.name || '',
      responses: state.responses,
      audio_base64: audioBase64
    };
    const ctrl = new AbortController();
    const tmout = setTimeout(() => ctrl.abort(), CONFIG.TIMEOUT_MS);
    const resp = await fetch(CONFIG.VOICE_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload),
      signal: ctrl.signal
    });
    clearTimeout(tmout);
    hideTimeoutBar();
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    
    console.log('📨 Réponse:', {next_field: data.next_field, is_complete: data.is_complete});
    
    state.responses = {...state.responses, ...(data.responses || {})};
    state.is_complete = data.is_complete || false;
    
    if (data.is_complete) {
      await playAudio('complete');
      document.getElementById('mic-status').textContent = 'Rapport complet ✓';
    } else if (data.next_field) {
      console.log('🎵 Audio pour:', data.next_field);
      await playAudio(data.next_field);
    }
    
    updateQuestionDisplay();
  } catch (e) {
    hideTimeoutBar();
    showToast('Erreur : ' + (e.name === 'AbortError' ? 'Timeout' : e.message));
    document.getElementById('mic-status').textContent = 'Erreur — réessaie';
  } finally {
    state.isProcessing = false;
    document.getElementById('walkie-btn').classList.remove('processing', 'listening');
    if (!state.is_complete) {
      document.getElementById('mic-status').textContent = 'Maintiens pour parler';
    }
  }
}

async function startReport() {
  await unlockAudio();
  document.getElementById('mic-zone').classList.add('started');
  document.getElementById('connection-state').classList.add('visible');
  console.log('🎯 Jouer init.mp3');
  await playAudio('init');
  document.getElementById('connection-state').classList.remove('visible');
  showQuestionContent();
}

function toggleVoiceDropdown() {
  const dd = document.getElementById('voice-dropdown');
  const btn = document.getElementById('voice-btn');
  const isOpen = dd.classList.contains('open');
  dd.classList.toggle('open', !isOpen);
  btn.classList.toggle('open', !isOpen);
  if (!isOpen) {
    setTimeout(() => document.addEventListener('click', e => {
      if (!document.getElementById('voice-selector').contains(e.target)) {
        dd.classList.remove('open');
        btn.classList.remove('open');
      }
    }, {once: true}), 0);
  }
}

async function selectVoice(voice) {
  await unlockAudio();
  _selectedVoice = voice;
  localStorage.setItem('talco_voice', voice);
  document.getElementById('voice-btn-label').textContent = voice.toUpperCase();
  document.querySelectorAll('.voice-option').forEach(el => {
    const isActive = el.dataset.voice === voice;
    el.classList.toggle('active', isActive);
    el.querySelector('.vo-name').classList.toggle('active', isActive);
  });
  document.getElementById('voice-dropdown').classList.remove('open');
  document.getElementById('voice-btn').classList.remove('open');
  showToast('Voix : ' + voice);
}

function initVoiceSelector() {
  document.getElementById('voice-btn-label').textContent = _selectedVoice.toUpperCase();
  document.querySelectorAll('.voice-option').forEach(el => {
    const isActive = el.dataset.voice === _selectedVoice;
    el.classList.toggle('active', isActive);
    el.querySelector('.vo-name').classList.toggle('active', isActive);
  });
}

window.addEventListener('DOMContentLoaded', () => {
  initVoiceSelector();
  setupPTT();
  setTimeout(() => {
    if (!window.google) {
      document.getElementById('btn-fallback').style.display = 'flex';
    }
  }, 4000);
  const saved = loadUserSession();
  if (saved) onUserAuthenticated(saved);
});
</script>
