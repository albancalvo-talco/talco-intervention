<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>TALCO LR — Rapport d'Intervention</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#E8A900; --bg:#0a0a0a; --s1:#111; --s2:#181818; --s3:#222;
  --border:rgba(255,255,255,.08); --text:#f0ece4; --text2:#706e66; --text3:#4a4840;
  --danger:#e05252; --success:#4ecb7a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
.screen{display:none;flex-direction:column;height:100dvh;overflow:hidden;}
.screen.active{display:flex;}

/* LOGIN */
#screen-login{align-items:center;justify-content:center;padding:2rem;gap:1.2rem;}
.login-title{font-family:Syne,sans-serif;font-size:2rem;font-weight:800;text-align:center;line-height:1.1;}
.login-title span{color:var(--gold);}
.login-sub{font-size:13px;color:var(--text2);text-align:center;}
.btn-google{display:flex;align-items:center;gap:12px;background:var(--s3);border:1px solid var(--border);color:var(--text);padding:14px 24px;border-radius:100px;font-size:14px;font-weight:600;cursor:pointer;width:100%;max-width:300px;justify-content:center;}
.btn-google svg{width:20px;height:20px;}
.login-note{font-size:11px;color:var(--text3);text-align:center;}
#login-error{display:none;padding:10px 16px;background:rgba(224,82,82,.1);border:1px solid var(--danger);border-radius:10px;font-size:12px;color:var(--danger);text-align:center;max-width:300px;}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0;}
.header-user{display:flex;align-items:center;gap:8px;font-family:Syne,sans-serif;font-size:12px;font-weight:600;}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--gold);color:#111;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
.btn-new{font-family:'DM Mono',monospace;font-size:9px;color:var(--text2);background:transparent;border:1px solid var(--border);border-radius:100px;padding:5px 10px;cursor:pointer;}

/* LAYOUT */
.main-body{flex:1;display:grid;grid-template-columns:1fr 78px;grid-template-rows:1fr auto;overflow:hidden;}

/* FEED */
.feed-col{grid-column:1;grid-row:1;overflow:hidden;display:flex;flex-direction:column;}
.feed-scroll{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
.feed-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:13px;text-align:center;line-height:1.6;}
.bubble{max-width:85%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.5;animation:fadeIn .2s;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.bubble.agent{align-self:flex-start;background:var(--s2);border:1px solid var(--border);border-bottom-left-radius:4px;}
.bubble .b-name{font-family:'DM Mono',monospace;font-size:9px;color:var(--gold);letter-spacing:.1em;margin-bottom:4px;text-transform:uppercase;}
.bubble.user{align-self:flex-end;background:rgba(232,169,0,.1);border:1px solid rgba(232,169,0,.15);border-bottom-right-radius:4px;}
.bubble.user .b-name{color:var(--text2);text-align:right;}
.bubble.typing{align-self:flex-start;background:var(--s2);border:1px solid var(--border);padding:14px 18px;}
.typing-dots{display:flex;gap:5px;}.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:tdot 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:.2s;}.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes tdot{0%,60%,100%{opacity:.3;}30%{opacity:1;}}

/* FIELDS COL */
.fields-col{grid-column:2;grid-row:1/3;background:var(--s1);border-left:1px solid var(--border);overflow-y:auto;padding:8px 5px;display:flex;flex-direction:column;gap:4px;}
.fields-col::-webkit-scrollbar{display:none;}
.fields-col-title{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:.15em;color:var(--text3);text-transform:uppercase;text-align:center;padding:4px 0 6px;}
.f-chip{display:flex;align-items:center;gap:4px;background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:5px 6px;cursor:pointer;}
.f-chip.done{border-color:rgba(78,203,122,.2);background:rgba(78,203,122,.04);}
.f-chip .fc-dot{width:4px;height:4px;border-radius:50%;background:var(--s3);}
.f-chip.done .fc-dot{background:var(--success);}
.f-chip .fc-label{font-family:'DM Mono',monospace;font-size:7px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.f-chip.done .fc-label{color:rgba(78,203,122,.7);}

/* MIC ZONE */
.mic-zone{grid-column:1;grid-row:2;background:var(--bg);border-top:1px solid var(--border);padding:14px;display:flex;flex-direction:column;align-items:center;gap:10px;}
.walkie-btn{width:80px;height:80px;border-radius:20px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .3s cubic-bezier(.34,1.56,.64,1);position:relative;}
.walkie-btn:active{transform:scale(.92);}
.walkie-btn svg{width:60px;height:60px;transition:filter .4s, transform .3s;}
.walkie-btn svg{filter:brightness(0) invert(.85);}
.walkie-btn.listening svg{filter:brightness(0) saturate(100%) invert(38%) sepia(82%) saturate(2000%) hue-rotate(338deg) brightness(95%) contrast(92%);}
.walkie-btn.listening{animation:walkiePulse 1.2s ease-in-out infinite;}
.walkie-btn.speaking svg{filter:brightness(0) saturate(100%) invert(67%) sepia(67%) saturate(600%) hue-rotate(5deg) brightness(100%) contrast(95%);}
.walkie-btn.speaking{animation:walkiePulse 1.5s ease-in-out infinite;}
.walkie-btn.processing svg{filter:brightness(0) invert(.4);opacity:.6;}
@keyframes walkiePulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
.mic-status{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.08em;text-align:center;min-height:16px;}

/* PROGRESS BAR TIMEOUT */
.timeout-bar-wrap{width:100%;max-width:400px;height:2px;background:var(--s3);border-radius:2px;overflow:hidden;opacity:0;transition:opacity .3s;}
.timeout-bar-wrap.visible{opacity:1;}
.timeout-bar{height:100%;background:var(--gold);border-radius:2px;width:100%;transition:width linear;}

.input-row{display:flex;align-items:center;gap:8px;width:100%;max-width:400px;}
.text-input{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:100px;padding:10px 16px;font-size:13px;color:var(--text);outline:none;}
.text-input::placeholder{color:var(--text3);}
.text-input:focus{border-color:rgba(232,169,0,.3);}
.btn-send{width:38px;height:38px;border-radius:50%;background:var(--gold);border:none;color:#111;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.btn-send svg{width:16px;height:16px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.visible{display:flex;}
.modal-sheet{background:var(--s1);border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:85dvh;display:flex;flex-direction:column;overflow:hidden;animation:slideUp .3s;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;}
.modal-title{font-family:Syne,sans-serif;font-size:18px;font-weight:700;}
.modal-close{width:32px;height:32px;border-radius:50%;background:var(--s3);border:1px solid var(--border);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;}
.modal-body{flex:1;overflow-y:auto;padding:0 20px 20px;display:flex;flex-direction:column;gap:10px;}
.preview-field{padding:10px 14px;background:var(--s2);border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column;gap:4px;}
.pf-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;}
.pf-value{font-size:14px;color:var(--text);background:transparent;border:none;outline:none;width:100%;padding:0;font-family:Inter,sans-serif;}
.pf-value::placeholder{color:var(--text3);font-style:italic;}
.preview-photos{padding:12px 14px;background:var(--s2);border:1px solid var(--border);border-radius:10px;}
.photos-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px;}
.photo-thumb{aspect-ratio:1;border-radius:8px;background:var(--s3);overflow:hidden;position:relative;border:1px solid var(--border);}
.photo-thumb img{width:100%;height:100%;object-fit:cover;}
.photo-thumb .rm-ph{position:absolute;top:3px;right:3px;width:18px;height:18px;background:rgba(0,0,0,.8);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;cursor:pointer;border:none;}
.photo-add-label{aspect-ratio:1;border-radius:8px;background:var(--s1);border:1.5px dashed rgba(232,169,0,.3);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;}
.photo-add-label svg{width:16px;height:16px;color:var(--gold);opacity:.5;}
.photo-add-label span{font-family:'DM Mono',monospace;font-size:7px;color:var(--text3);}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;}
.btn-modal{flex:1;padding:14px;border-radius:10px;border:none;font-family:Syne,sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.btn-modal.primary{background:var(--gold);color:#111;}
.btn-modal.secondary{background:var(--s3);color:var(--text2);border:1px solid var(--border);}

/* CONFIRMATION */
#screen-confirmation{align-items:center;justify-content:center;text-align:center;padding:2rem;gap:1.2rem;}
.confirm-icon{width:64px;height:64px;border-radius:50%;background:var(--success);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.8rem;}
.confirm-title{font-family:Syne,sans-serif;font-size:1.6rem;font-weight:800;color:var(--gold);}
.confirm-recap{background:var(--s1);border:1px solid var(--border);border-left:2px solid var(--gold);border-radius:14px;padding:1rem;width:100%;max-width:360px;text-align:left;font-size:13px;line-height:2;color:var(--text2);}
.confirm-recap strong{color:var(--text);font-weight:600;}
.btn-nouveau{background:var(--gold);color:#111;border:none;padding:14px 28px;border-radius:100px;font-family:Syne,sans-serif;font-size:14px;font-weight:700;cursor:pointer;}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--s3);border:1px solid var(--border);border-radius:100px;padding:10px 20px;font-size:12px;color:var(--text);opacity:0;transition:opacity .3s;pointer-events:none;z-index:600;white-space:nowrap;}
.toast.visible{opacity:1;}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(10,10,10,.94);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;z-index:700;opacity:0;pointer-events:none;transition:opacity .3s;}
.loading-overlay.visible{opacity:1;pointer-events:all;}
.spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <h1 class="login-title">Rapport<br><span>vocal</span></h1>
  <p class="login-sub">Connexion avec votre compte Talco LR</p>
  <div id="g_id_onload"
    data-client_id="303849110460-10rqg6oco2jseasj4ccsh1n0e4btulea.apps.googleusercontent.com"
    data-callback="handleGoogleCredential" data-auto_prompt="false"></div>
  <div class="g_id_signin"
    data-type="standard" data-shape="pill" data-theme="filled_black"
    data-text="signin_with" data-size="large" data-locale="fr" data-width="280"></div>
  <button class="btn-google" id="btn-fallback" onclick="loginFallback()" style="display:none">
    <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Se connecter avec Google
  </button>
  <p class="login-note">Réservé aux comptes @talco-lr.com</p>
  <div id="login-error">⚠ Compte non autorisé</div>
</div>

<!-- CHAT -->
<div id="screen-chat" class="screen">
  <div class="header">
    <span style="font-family:Syne,sans-serif;font-size:14px;font-weight:700;color:var(--gold);">TALCO</span>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="header-user">
        <div class="avatar" id="user-avatar">T</div>
        <span id="user-name">Tech</span>
      </div>
      <button class="btn-new" onclick="newSession()">NOUVEAU</button>
    </div>
  </div>
  <div class="main-body">
    <div class="feed-col">
      <div class="feed-scroll" id="feed-scroll">
        <div class="feed-empty" id="feed-empty">Appuie sur le micro ou tape un message pour commencer</div>
      </div>
    </div>
    <div class="fields-col" id="fields-col">
      <div class="fields-col-title">Champs</div>
    </div>
    <div class="mic-zone">
      <button class="walkie-btn" id="walkie-btn" onclick="handleMicClick()">

          <rect x="44" y="2" width="4" height="22" rx="2" fill="currentColor"/>
          <circle cx="46" cy="4" r="3" fill="currentColor"/>
          <rect x="28" y="22" width="36" height="62" rx="6" fill="currentColor"/>
          <rect x="34" y="30" width="24" height="14" rx="3" fill="#0a0a0a" opacity=".6"/>
          <line x1="37" y1="35" x2="55" y2="35" stroke="#0a0a0a" stroke-width="1.5" opacity=".3"/>
          <line x1="37" y1="39" x2="50" y2="39" stroke="#0a0a0a" stroke-width="1.5" opacity=".3"/>
          <line x1="36" y1="52" x2="56" y2="52" stroke="#0a0a0a" stroke-width="1.2" opacity=".25"/>
          <line x1="36" y1="56" x2="56" y2="56" stroke="#0a0a0a" stroke-width="1.2" opacity=".25"/>
          <line x1="36" y1="60" x2="56" y2="60" stroke="#0a0a0a" stroke-width="1.2" opacity=".25"/>
          <line x1="36" y1="64" x2="56" y2="64" stroke="#0a0a0a" stroke-width="1.2" opacity=".25"/>
          <line x1="36" y1="68" x2="56" y2="68" stroke="#0a0a0a" stroke-width="1.2" opacity=".25"/>
          <rect x="22" y="36" width="6" height="14" rx="2" fill="currentColor" opacity=".7"/>
          <rect x="38" y="84" width="16" height="6" rx="2" fill="currentColor" opacity=".5"/>
        </svg>
      </button>
      <div class="mic-status" id="mic-status">Appuie pour parler</div>
      <!-- FIX #7 : barre de progression timeout visible -->
      <div class="timeout-bar-wrap" id="timeout-bar-wrap">
        <div class="timeout-bar" id="timeout-bar"></div>
      </div>
      <div class="input-row">
        <input type="text" class="text-input" id="text-input" placeholder="Ou tape ton message..." autocomplete="off">
        <button class="btn-send" onclick="sendTextInput()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        </button>

</div>

<!-- PREVIEW -->
<div class="modal-overlay" id="modal-preview">
  <div class="modal-sheet">
    <div class="modal-header">
      <div class="modal-title">Résumé du rapport</div>
      <button class="modal-close" onclick="closePreview()">✕</button>
    </div>
    <div class="modal-body" id="preview-body"></div>
    <div class="modal-footer">
      <button class="btn-modal secondary" onclick="closePreview()">Retour</button>
      <button class="btn-modal primary" onclick="submitReport()">Envoyer</button>
    </div>
  </div>
</div>

<!-- CONFIRMATION -->
<div id="screen-confirmation" class="screen">
  <div class="confirm-icon">✓</div>
  <div class="confirm-title">Rapport envoyé !</div>
  <div class="confirm-recap" id="confirm-recap"></div>
  <button class="btn-nouveau" onclick="nouveauRapport()">+ Nouveau rapport</button>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="file-input" accept="image/*" capture="environment" multiple style="display:none" onchange="handlePhotoInput(this)">
<div class="loading-overlay" id="loading"><div class="spinner"></div><div class="loading-text" id="loading-text">Envoi...</div></div>

<script>
// ══ CONFIG ══
const CONFIG = {
  GOOGLE_CLIENT_ID: '303849110460-10rqg6oco2jseasj4ccsh1n0e4btulea.apps.googleusercontent.com',
  VOICE_URL: 'https://n8n.talco-lr.com/webhook/talco-voice-chat',
  ALLOWED_DOMAIN: 'talco-lr.com',
  TIMEOUT_MS: 60000
};

const FIELD_LABELS = {
  nom_client:'Client', numero_affaire:'Affaire', date_debut:'Début', date_fin:'Fin',
  heure_debut:'H.début', heure_fin:'H.fin', redacteur:'Rédacteur', techniciens_presents:'Techniciens',
  clients_presents:'Clients site', type_intervention:'Type', designation_precise:'Description',
  raison_intervention:'Raison', chantier_termine:'Terminé', si_non_details:'Reste à faire',
  difficultes:'Difficultés', points_attention:'Pts attention'
};
const FIELD_ORDER = Object.keys(FIELD_LABELS);

// ══ STATE ══
let state = {
  user: null,
  session_id: null,
  history: [],
  responses: {},
  is_complete: false,
  // FIX #4 : séparer isInitializing de isProcessing
  isInitializing: false,
  isProcessing: false,
  isListening: false,
  mediaRecorder: null,
  audioChunks: [],
  currentAudio: null,
  photoFiles: [],
  photoUrls: [],
  // FIX #5 : queue audio pour éviter la race condition
  pendingAudio: null
};

const SESSION_KEY = 'talco_user_session';
const SESSION_TTL = 7 * 24 * 60 * 60 * 1000;

// ══ AUTH ══
function saveUserSession(u) {
  localStorage.setItem(SESSION_KEY, JSON.stringify({ user: u, expires: Date.now() + SESSION_TTL }));
}
function loadUserSession() {
  try {
    const d = JSON.parse(localStorage.getItem(SESSION_KEY));
    if (!d || Date.now() > d.expires) { localStorage.removeItem(SESSION_KEY); return null; }
    return d.user;
  } catch(e) { return null; }
}
function handleGoogleCredential(r) {
  try {
    const p = JSON.parse(atob(r.credential.split('.')[1]));
    const email = p.email || '', name = p.name || email.split('@')[0];
    if (!email.endsWith('@' + CONFIG.ALLOWED_DOMAIN)) {
      document.getElementById('login-error').style.display = 'block'; return;
    }
    const initials = name.split(' ').map(s => s[0]).join('').slice(0, 2).toUpperCase();
    const user = { email, name, initials, picture: p.picture || null };
    saveUserSession(user);
    onUserAuthenticated(user);
  } catch(e) { showToast('Erreur connexion'); }
}
function loginFallback() {
  const email = prompt('Email:', 'prenom.nom@talco-lr.com');
  if (!email || !email.endsWith('@' + CONFIG.ALLOWED_DOMAIN)) {
    document.getElementById('login-error').style.display = 'block'; return;
  }
  const name = email.split('@')[0].split('.').map(s => s.charAt(0).toUpperCase() + s.slice(1)).join(' ');
  const user = { email, name, initials: name.split(' ').map(s => s[0]).join('').slice(0, 2).toUpperCase() };
  saveUserSession(user);
  onUserAuthenticated(user);
}
function onUserAuthenticated(user) {
  state.user = user;
  const av = document.getElementById('user-avatar');
  if (user.picture) av.innerHTML = `<img src="${user.picture}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
  else av.textContent = user.initials;
  document.getElementById('user-name').textContent = user.name.split(' ')[0];
  startSession();
}

// ══ SESSION ══
function startSession() {
  // FIX #4 : reset complet des guards
  state.session_id = 's_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
  state.history = [];
  state.responses = {};
  state.is_complete = false;
  state.isInitializing = false;
  state.isProcessing = false;
  state.isListening = false;
  state.photoFiles = [];
  state.photoUrls = [];
  // FIX #5 : vider la queue audio
  state.pendingAudio = null;
  if (state.currentAudio) {
    try { state.currentAudio.pause(); } catch(e) {}
    state.currentAudio = null;
  }
  document.getElementById('feed-scroll').innerHTML = '<div class="feed-empty" id="feed-empty">Appuie sur le micro ou tape un message pour commencer</div>';
  document.getElementById('walkie-btn').className = 'walkie-btn';
  updateMicStatus('Appuie pour parler');
  hideTimeoutBar();
  updateFieldsRecap();
  showScreen('chat');
}
function newSession() { startSession(); }
function nouveauRapport() { startSession(); }

// ══ UI ══
function showScreen(n) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + n).classList.add('active');
}
function showToast(msg, d = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('visible');
  setTimeout(() => t.classList.remove('visible'), d);
}
function escHtml(t) {
  return t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function updateMicStatus(msg) { document.getElementById('mic-status').textContent = msg; }
function updateFieldsRecap() {
  const col = document.getElementById('fields-col');
  col.innerHTML = '<div class="fields-col-title">Champs</div>';
  FIELD_ORDER.forEach(key => {
    const val = state.responses[key];
    const chip = document.createElement('div');
    chip.className = 'f-chip' + (val ? ' done' : '');
    chip.innerHTML = `<div class="fc-dot"></div><span class="fc-label">${FIELD_LABELS[key]}</span>`;
    if (val) chip.title = val;
    chip.onclick = () => openFieldEdit(key);
    col.appendChild(chip);
  });
}

// FIX #7 : barre de progression timeout
let _timeoutBarTimer = null;
function showTimeoutBar(durationMs) {
  const wrap = document.getElementById('timeout-bar-wrap');
  const bar = document.getElementById('timeout-bar');
  wrap.classList.add('visible');
  bar.style.transition = 'none';
  bar.style.width = '100%';
  // forcer le reflow avant d'animer
  bar.offsetWidth;
  bar.style.transition = `width ${durationMs}ms linear`;
  bar.style.width = '0%';
}
function hideTimeoutBar() {
  const wrap = document.getElementById('timeout-bar-wrap');
  const bar = document.getElementById('timeout-bar');
  wrap.classList.remove('visible');
  bar.style.transition = 'none';
  bar.style.width = '100%';
}

// ══ BUBBLES ══
function addBubble(role, text) {
  const feed = document.getElementById('feed-scroll');
  document.getElementById('feed-empty')?.remove();
  const div = document.createElement('div');
  div.className = 'bubble ' + role;
  const label = role === 'agent' ? 'TALCO-IA' : (state.user?.name?.split(' ')[0] || 'Moi');
  div.innerHTML = `<div class="b-name">${label}</div>${escHtml(text)}`;
  feed.appendChild(div);
  feed.scrollTop = feed.scrollHeight;
}
function addTyping(id) {
  const feed = document.getElementById('feed-scroll');
  const div = document.createElement('div');
  div.className = 'bubble typing'; div.id = id;
  div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  feed.appendChild(div);
  feed.scrollTop = feed.scrollHeight;
}
function removeTyping(id) { document.getElementById(id)?.remove(); }

// ══ MIC ══
// FIX #4 : guard isInitializing pour le premier clic, évite double-appel __init__
async function handleMicClick() {
  if (state.isProcessing || state.isInitializing) return;
  if (state.isListening) { stopRecording(); return; }
  if (state.history.length === 0) {
    state.isInitializing = true;
    await sendToAgent(null, '__init__');
    state.isInitializing = false;
    return;
  }
  await startRecording();
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    state.audioChunks = [];
    state.mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
    state.mediaRecorder.ondataavailable = e => { if (e.data.size > 0) state.audioChunks.push(e.data); };
    state.mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(state.audioChunks, { type: 'audio/webm' });
      // Envoyer base64 SANS préfixe — cohérent avec ce que n8n attend
      const b64 = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result.replace(/^data:audio\/[^;]+;base64,/, '').replace(/\s+/g, ''));
        r.onerror = rej;
        r.readAsDataURL(blob);
      });
      sendToAgent(b64, null);
    };
    state.mediaRecorder.start();
    state.isListening = true;
    document.getElementById('walkie-btn').classList.add('listening');
    updateMicStatus('🎤 Écoute... (appuie pour arrêter)');
  } catch(e) {
    showToast('Micro non disponible');
  }
}

function stopRecording() {
  if (state.mediaRecorder && state.isListening) {
    state.mediaRecorder.stop();
    state.isListening = false;
    document.getElementById('walkie-btn').classList.remove('listening');
    document.getElementById('walkie-btn').classList.add('processing');
    updateMicStatus('Traitement...');
  }
}

// ══ TEXT INPUT ══
function sendTextInput() {
  const input = document.getElementById('text-input');
  const text = input.value.trim();
  if (!text || state.isProcessing || state.isInitializing) return;
  input.value = '';
  document.getElementById('feed-empty')?.remove();
  addBubble('user', text);
  sendToAgent(null, text);
}

// ══ AGENT ══
async function sendToAgent(audioBase64, textInput) {
  // FIX #4 : guard strict — pas de double appel possible
  if (state.isProcessing) return;
  state.isProcessing = true;

  document.getElementById('walkie-btn').classList.add('processing');
  updateMicStatus('Connexion au serveur...');

  if (audioBase64) addBubble('user', '🎤 Message vocal');
  const typingId = 't_' + Date.now();
  addTyping(typingId);

  // FIX #7 : afficher barre de progression timeout
  showTimeoutBar(CONFIG.TIMEOUT_MS);

  try {
    // FIX #1 : toujours envoyer en JSON (pas de FormData pour le chat)
    // Le submit final (photos) utilise FormData séparément via submitReport()
    const payload = {
      session_id: state.session_id,
      sender_email: state.user?.email || '',
      sender_name: state.user?.name || '',
      history: state.history,
      responses: state.responses
    };
    if (audioBase64) payload.audio_base64 = audioBase64;
    if (textInput === '__init__') payload.text_input = '__init__';
    else if (textInput) payload.text_input = textInput;

    updateMicStatus('Envoi au serveur...');

    const ctrl = new AbortController();
    const tmout = setTimeout(() => ctrl.abort(), CONFIG.TIMEOUT_MS);

    const resp = await fetch(CONFIG.VOICE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      signal: ctrl.signal
    });
    clearTimeout(tmout);
    hideTimeoutBar();

    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();

    removeTyping(typingId);
    state.history = data.history || state.history;
    state.responses = { ...state.responses, ...(data.responses || {}) };
    state.is_complete = data.is_complete || false;

    if (data.speech) addBubble('agent', data.speech);
    updateFieldsRecap();

    // FIX #3 (mode continu dans index.html n'existe pas, mais audio doit
    // être joué AVANT de relâcher isProcessing)
    if (data.audio_base64) {
      // FIX #2 : playAudio gère les deux formats (avec ou sans préfixe data:)
      await playAudio(data.audio_base64);
    }

    if (state.is_complete) {
      updateMicStatus('Rapport complet ✓');
      showPreview();
    }

  } catch(e) {
    hideTimeoutBar();
    removeTyping(typingId);
    const msg = e.name === 'AbortError' ? 'Timeout — serveur trop long' : e.message;
    addBubble('agent', 'Erreur : ' + msg);
    updateMicStatus('Erreur — réessaie');
  } finally {
    state.isProcessing = false;
    document.getElementById('walkie-btn').classList.remove('processing', 'listening');
    if (!state.is_complete && !document.getElementById('mic-status').textContent.startsWith('Erreur') && !document.getElementById('mic-status').textContent.startsWith('Rapport')) {
      updateMicStatus('Appuie pour parler');
    }
  }
}

// ══ AUDIO ══
// FIX #2 : gère base64 avec ET sans préfixe "data:audio/..."
async function playAudio(base64) {
  return new Promise(resolve => {
    if (!base64) { resolve(); return; }
    try {
      // Normaliser : retirer le préfixe s'il est présent, puis reconstruire proprement
      const raw = base64.replace(/^data:audio\/[^;]+;base64,/, '').replace(/\s+/g, '');
      if (!raw) { resolve(); return; }
      const bytes = Uint8Array.from(atob(raw), c => c.charCodeAt(0));
      const blob = new Blob([bytes], { type: 'audio/mpeg' });
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      if (state.currentAudio) {
        try { state.currentAudio.pause(); } catch(e) {}
        state.currentAudio = null;
      }
      state.currentAudio = audio;
      document.getElementById('walkie-btn').classList.add('speaking');
      updateMicStatus('TALCO-IA parle...');
      const cleanup = () => {
        URL.revokeObjectURL(url);
        state.currentAudio = null;
        document.getElementById('walkie-btn').classList.remove('speaking');
      };
      audio.onended = () => { cleanup(); resolve(); };
      audio.onerror = () => { cleanup(); resolve(); };
      audio.play().catch(() => { cleanup(); resolve(); });
    } catch(e) {
      resolve();
    }
  });
}

// ══ PHOTOS ══
function handlePhotoInput(input) {
  Array.from(input.files).slice(0, 5 - state.photoFiles.length).forEach(file => {
    if (state.photoFiles.length >= 5) return;
    state.photoFiles.push(file);
    state.photoUrls.push(URL.createObjectURL(file));
  });
  input.value = '';
  rebuildPhotoGrid();
}
function rebuildPhotoGrid() {
  const grid = document.getElementById('photos-grid');
  if (!grid) return;
  grid.innerHTML = '';
  state.photoUrls.forEach((url, i) => {
    const div = document.createElement('div');
    div.className = 'photo-thumb';
    div.innerHTML = `<img src="${url}"><button class="rm-ph" onclick="removePhoto(${i})">✕</button>`;
    grid.appendChild(div);
  });
  if (state.photoFiles.length < 5) {
    const add = document.createElement('label');
    add.className = 'photo-add-label';
    add.setAttribute('for', 'file-input');
    add.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg><span>Photo</span>';
    grid.appendChild(add);
  }
  const c = document.getElementById('photo-counter');
  if (c) c.textContent = state.photoFiles.length + ' / 5';
}
function removePhoto(i) {
  URL.revokeObjectURL(state.photoUrls[i]);
  state.photoFiles.splice(i, 1);
  state.photoUrls.splice(i, 1);
  rebuildPhotoGrid();
}

// ══ PREVIEW ══
function showPreview() {
  const body = document.getElementById('preview-body');
  body.innerHTML = '';
  FIELD_ORDER.forEach(key => {
    const val = state.responses[key] || '';
    const div = document.createElement('div');
    div.className = 'preview-field';
    div.innerHTML = `<div class="pf-label">${FIELD_LABELS[key]}</div><input class="pf-value" data-key="${key}" value="${escHtml(val)}" placeholder="Non renseigné">`;
    body.appendChild(div);
  });
  const photoDiv = document.createElement('div');
  photoDiv.className = 'preview-photos';
  photoDiv.innerHTML = `<div class="pf-label">Photos chantier <span id="photo-counter">${state.photoFiles.length} / 5</span></div><div class="photos-grid" id="photos-grid"></div>`;
  body.appendChild(photoDiv);
  rebuildPhotoGrid();
  document.getElementById('modal-preview').classList.add('visible');
}
function closePreview() {
  document.querySelectorAll('#preview-body .pf-value').forEach(inp => {
    const key = inp.dataset.key, val = inp.value.trim();
    if (val) state.responses[key] = val;
    else delete state.responses[key];
  });
  updateFieldsRecap();
  document.getElementById('modal-preview').classList.remove('visible');
}
function openFieldEdit(key) {
  showPreview();
  setTimeout(() => {
    const inp = document.querySelector(`#preview-body .pf-value[data-key="${key}"]`);
    if (inp) { inp.focus(); inp.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
  }, 400);
}

// ══ SUBMIT ══
// FIX #1 : submit utilise FormData (avec photos) — endpoint différent du chat JSON
async function submitReport() {
  document.querySelectorAll('#preview-body .pf-value').forEach(inp => {
    const key = inp.dataset.key, val = inp.value.trim();
    if (val) state.responses[key] = val;
  });
  document.getElementById('modal-preview').classList.remove('visible');
  document.getElementById('loading-text').textContent = 'Envoi du rapport...';
  document.getElementById('loading').classList.add('visible');
  try {
    const fd = new FormData();
    fd.append('data', JSON.stringify({
      session_id: state.session_id,
      sender_email: state.user?.email || '',
      sender_name: state.user?.name || '',
      responses: state.responses,
      source: 'voice-agent-v2',
      action: 'submit_report'
    }));
    state.photoFiles.forEach((f, i) => fd.append(`photo_${i + 1}`, f, f.name));
    // NOTE : le même webhook n8n reçoit action='submit_report' pour distinguer
    // le flow de soumission finale du flow de chat
    const resp = await fetch(CONFIG.VOICE_URL, { method: 'POST', body: fd });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    document.getElementById('loading').classList.remove('visible');
    showConfirmation();
  } catch(e) {
    document.getElementById('loading').classList.remove('visible');
    showToast('Erreur : ' + e.message);
  }
}

function showConfirmation() {
  const r = state.responses;
  document.getElementById('confirm-recap').innerHTML =
    `<strong>👷 ${state.user?.name || ''}</strong><br>` +
    `Client: <strong>${r.nom_client || '—'}</strong><br>` +
    `Affaire: <strong>${r.numero_affaire || '—'}</strong><br>` +
    `Type: <strong>${r.type_intervention || '—'}</strong><br>` +
    `Terminé: <strong>${r.chantier_termine || '—'}</strong><br>` +
    `Photos: <strong>${state.photoFiles.length}</strong>`;
  showScreen('confirmation');
}

window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('text-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendTextInput(); }
  });
  setTimeout(() => { if (!window.google) document.getElementById('btn-fallback').style.display = 'flex'; }, 4000);
  const saved = loadUserSession();
  if (saved) onUserAuthenticated(saved);
});
