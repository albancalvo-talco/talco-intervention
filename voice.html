<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0e0e0e">
<title>TALCO — Agent Vocal</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/voice.css">
<style>
/* FIX overflow grid sur petit écran quand panel ouvert */
.chat-body {
  grid-template-rows: auto auto 1fr auto;
}
.conv-panel.open {
  max-height: 38vh;
}
/* Assure que la mic-zone ne déborde jamais */
.mic-zone {
  min-height: 0;
  flex-shrink: 0;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="login-logo-wrap"><img class="logo-img" alt="TALCO LR"></div>
  <div class="login-divider"></div>
  <h1 class="login-title">Agent<br><span>vocal</span></h1>
  <p class="login-sub">Rapport d'intervention par la voix</p>
  <div id="g_id_onload"
    data-client_id="303849110460-10rqg6oco2jseasj4ccsh1n0e4btulea.apps.googleusercontent.com"
    data-callback="handleGoogleCredential"
    data-auto_prompt="false">
  </div>
  <div class="g_id_signin"
    data-type="standard" data-shape="pill" data-theme="filled_black"
    data-text="signin_with" data-size="large" data-locale="fr" data-width="280">
  </div>
  <button class="btn-google" id="btn-fallback" onclick="loginFallback()" style="display:none">
    <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Se connecter avec Google
  </button>
  <p class="login-note">Réservé aux comptes @talco-lr.com</p>
  <div id="login-error" style="display:none;margin-top:1rem;padding:10px 16px;background:rgba(224,82,82,.1);border:1px solid var(--danger);border-radius:10px;font-size:12px;color:var(--danger);text-align:center;max-width:300px;">
    ⚠ Compte non autorisé
  </div>
</div>

<!-- CHAT VOCAL -->
<div id="screen-chat" class="screen">
  <div class="header">
    <div class="header-logo-wrap"><img class="logo-img" alt="TALCO LR"></div>
    <div class="header-right">
      <div class="header-user">
        <div class="avatar" id="user-avatar">T</div>
        <span id="user-name">Tech</span>
      </div>
      <button class="btn-new-session" onclick="newSession()">NOUVEAU</button>
    </div>
  </div>

  <div class="chat-body">

    <!-- Toggle conversation -->
    <div class="conv-toggle" id="conv-toggle" onclick="toggleConvPanel()">
      <div class="conv-toggle-left">
        <span class="conv-toggle-label">Conversation</span>
        <span class="conv-toggle-count" id="conv-count">0</span>
      </div>
      <span class="conv-toggle-arrow">▼</span>
    </div>

    <!-- Feed conversation rétractable -->
    <div class="conv-panel" id="conv-panel">
      <div class="conv-history" id="conv-history"></div>
    </div>

    <!-- Chips champs — colonne droite -->
    <div class="fields-recap" id="fields-recap"></div>

    <!-- Zone orbe -->
    <div class="mic-zone">
      <div class="orb-wrap" id="orb-wrap" onclick="handleOrbClick()">
        <div class="orb-layer orb-bg idle" id="orb-bg"></div>
        <div class="orb-layer orb-mid"></div>
        <div class="orb-layer orb-core"></div>
        <div class="orb-layer orb-shine"></div>
        <div class="sending-indicator" id="sending-indicator"></div>
        <svg class="orb-mic-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
        </svg>
      </div>
      <div class="orb-wave idle" id="orb-wave">
        <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
        <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
        <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
        <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
      </div>
      <div class="orb-status" id="orb-status">Connexion...</div>
    </div>

    <!-- Barre mode continu -->
    <div class="mode-bar on" id="mode-bar" onclick="toggleContinuousMode()">
      <div class="mode-toggle-track" id="mode-track">
        <div class="mode-toggle-thumb"></div>
      </div>
      <span class="mode-bar-label" id="mode-label">Continu activé</span>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/common.js"></script>
<script src="js/voice.js"></script>
</body>
</html>
